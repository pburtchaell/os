name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The runner image ships an older shellcheck (0.9.0) whose SC2317
      # reachability check false-positives on indirectly-invoked functions.
      # Pin a current release so CI matches local development.
      - name: Install ShellCheck
        run: |
          VERSION=v0.11.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz" | tar -xJ
          sudo install "shellcheck-${VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Run ShellCheck
        run: shellcheck setup.sh scripts/*.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Run tests
        run: bats tests/
